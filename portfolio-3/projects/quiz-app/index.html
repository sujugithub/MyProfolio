<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Knowledge Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --bg: #f5f5f7;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --accent: #0071e3;
  --accent-light: #e8f0fe;
  --border: rgba(0,0,0,0.08);
  --radius: 18px;
  --green: #1a7f37;
  --green-bg: #dafbe1;
  --red: #d93025;
  --red-bg: #fce8e6;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.quiz-wrap {
  width: 100%;
  max-width: 620px;
}

/* ── PROGRESS ── */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(.16,1,.3,1);
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .05em;
  text-transform: uppercase;
}
.score-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 0 rgba(0,0,0,.03), 0 16px 48px rgba(0,0,0,.07);
  animation: cardIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-category {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.q-text {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -.3px;
  line-height: 1.4;
  margin-bottom: 28px;
  color: var(--text);
}

/* ── OPTIONS ── */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all .18s cubic-bezier(.16,1,.3,1);
  background: var(--white);
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  text-align: left;
  font-family: inherit;
  width: 100%;
}
.option:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateX(3px);
}
.option.correct {
  border-color: var(--green);
  background: var(--green-bg);
  color: var(--green);
}
.option.wrong {
  border-color: var(--red);
  background: var(--red-bg);
  color: var(--red);
}
.option:disabled { cursor: default; }

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  flex-shrink: 0;
  transition: all .18s;
}
.option.correct .option-letter {
  background: var(--green);
  color: #fff;
}
.option.wrong .option-letter {
  background: var(--red);
  color: #fff;
}
.option:hover:not(:disabled) .option-letter {
  background: var(--accent);
  color: #fff;
}

/* ── FEEDBACK ── */
.feedback {
  font-size: 13px;
  font-weight: 500;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  display: none;
  line-height: 1.5;
}
.feedback.show { display: block; animation: cardIn .3s ease; }
.feedback.correct-fb { background: var(--green-bg); color: var(--green); }
.feedback.wrong-fb { background: var(--red-bg); color: var(--red); }

/* ── NEXT BTN ── */
.btn-next {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .2s;
}
.btn-next.show { display: flex; animation: cardIn .3s ease; }
.btn-next:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,113,227,.3); }

/* ── RESULTS ── */
.results {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 48px 36px;
}
.results.show { display: flex; animation: cardIn .5s cubic-bezier(.16,1,.3,1); }

.result-emoji {
  font-size: 56px;
  margin-bottom: 16px;
  animation: bounce 1s ease;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-16px); }
  60% { transform: translateY(-8px); }
}

.result-score-big {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -2px;
  color: var(--text);
  margin-bottom: 4px;
}
.result-score-big span { color: var(--accent); }

.result-label {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}
.result-sub {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.65;
  max-width: 360px;
  margin-bottom: 32px;
}

.result-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  width: 100%;
}
.result-stat {
  flex: 1;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.result-stat .n { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
.result-stat .d { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
.result-stat.c { background: var(--green-bg); border-color: transparent; }
.result-stat.c .n { color: var(--green); }
.result-stat.w { background: var(--red-bg); border-color: transparent; }
.result-stat.w .n { color: var(--red); }
.result-stat.p { background: var(--accent-light); border-color: transparent; }
.result-stat.p .n { color: var(--accent); }

.btn-restart {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all .2s;
}
.btn-restart:hover { background: #3a3a3c; transform: translateY(-1px); }

/* ── START SCREEN ── */
.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 48px 36px;
}
.start-icon {
  width: 72px; height: 72px;
  background: var(--accent-light);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin-bottom: 20px;
}
.start-title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 8px; }
.start-sub { font-size: 14px; color: var(--text2); line-height: 1.65; max-width: 340px; margin-bottom: 28px; }
.start-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
.start-pill {
  font-size: 12px; font-weight: 500; color: var(--text2);
  background: var(--bg); padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border);
}
.btn-start {
  width: 100%; max-width: 260px;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all .2s;
}
.btn-start:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,113,227,.3); }
</style>
</head>
<body>

<div class="quiz-wrap">

  <!-- START SCREEN -->
  <div class="card" id="start-card">
    <div class="start-screen">
      <div class="start-icon">🧠</div>
      <div class="start-title">IT Knowledge Quiz</div>
      <p class="start-sub">Test your knowledge across networking, cloud, security, databases, and more. 10 questions. Let's go.</p>
      <div class="start-pills">
        <span class="start-pill">☁️ Cloud</span>
        <span class="start-pill">🔒 Security</span>
        <span class="start-pill">🌐 Networking</span>
        <span class="start-pill">🗄️ Databases</span>
        <span class="start-pill">💻 Dev</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-section" style="display:none;">
    <div class="progress-meta">
      <span class="progress-label" id="q-counter">Question 1 of 10</span>
      <span class="score-badge" id="score-badge">Score: 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="card" id="question-card">
      <div class="q-category" id="q-category">Category</div>
      <div class="q-text" id="q-text">Question goes here</div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next question →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="card" id="results-card" style="display:none;">
    <div class="results show">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-score-big" id="result-score"></div>
      <div class="result-label" id="result-label"></div>
      <p class="result-sub" id="result-sub"></p>
      <div class="result-stats">
        <div class="result-stat c">
          <div class="n" id="res-correct">0</div>
          <div class="d">Correct</div>
        </div>
        <div class="result-stat w">
          <div class="n" id="res-wrong">0</div>
          <div class="d">Wrong</div>
        </div>
        <div class="result-stat p">
          <div class="n" id="res-pct">0%</div>
          <div class="d">Score</div>
        </div>
      </div>
      <button class="btn-restart" onclick="restartQuiz()">↺ Try Again</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    category: "☁️ Cloud",
    text: "Which Microsoft Azure certification is entry-level and covers cloud fundamentals?",
    options: ["AZ-104", "AZ-900", "AZ-500", "AZ-204"],
    answer: 1,
    explain: "AZ-900 is the Azure Fundamentals certification — the entry-level exam covering core cloud concepts and Azure services."
  },
  {
    category: "🌐 Networking",
    text: "What does DNS stand for?",
    options: ["Data Network System", "Domain Name System", "Dynamic Network Service", "Distributed Node Server"],
    answer: 1,
    explain: "DNS (Domain Name System) translates human-readable domain names like google.com into IP addresses computers can use."
  },
  {
    category: "🔒 Security",
    text: "Which type of attack tricks a user into clicking something different from what they think they're clicking?",
    options: ["SQL Injection", "Clickjacking", "Man-in-the-Middle", "Brute Force"],
    answer: 1,
    explain: "Clickjacking overlays an invisible element over a legitimate page, tricking users into clicking something unintended."
  },
  {
    category: "🗄️ Databases",
    text: "Which SQL clause is used to filter records after grouping?",
    options: ["WHERE", "FILTER", "HAVING", "LIMIT"],
    answer: 2,
    explain: "HAVING is used after GROUP BY to filter grouped records. WHERE filters before grouping, HAVING filters after."
  },
  {
    category: "💻 Dev",
    text: "What does API stand for?",
    options: ["Application Programming Interface", "Automated Program Integration", "Advanced Protocol Interface", "Application Process Input"],
    answer: 0,
    explain: "API stands for Application Programming Interface — a way for different software applications to communicate with each other."
  },
  {
    category: "☁️ Cloud",
    text: "Which Microsoft Power Platform tool is used to automate repetitive workflows?",
    options: ["Power BI", "Power Apps", "Power Automate", "Power Virtual Agents"],
    answer: 2,
    explain: "Power Automate (formerly Microsoft Flow) is used to create automated workflows between apps and services."
  },
  {
    category: "🌐 Networking",
    text: "What is the maximum number of host addresses in a /24 subnet?",
    options: ["254", "256", "255", "128"],
    answer: 0,
    explain: "A /24 subnet has 256 addresses total, but 1 is the network address and 1 is broadcast — leaving 254 usable host addresses."
  },
  {
    category: "🔒 Security",
    text: "What does MFA stand for in cybersecurity?",
    options: ["Multi-Factor Authentication", "Managed Firewall Access", "Multi-File Authorisation", "Main Fault Analysis"],
    answer: 0,
    explain: "MFA (Multi-Factor Authentication) requires users to verify identity using two or more methods — e.g., password + phone code."
  },
  {
    category: "💻 Dev",
    text: "In Python, which data structure stores key-value pairs?",
    options: ["List", "Tuple", "Set", "Dictionary"],
    answer: 3,
    explain: "A Python dictionary stores data as key-value pairs, e.g., {'name': 'Sujay', 'age': 22}. Similar to JSON objects."
  },
  {
    category: "🗄️ Databases",
    text: "Which database type stores data in a table format with rows and columns?",
    options: ["Document DB", "Graph DB", "Relational DB", "Key-Value Store"],
    answer: 2,
    explain: "Relational databases (like MySQL, PostgreSQL, SQL Server) organise data into tables with defined schemas and relationships."
  }
];

let currentQ = 0;
let score = 0;
let wrong = 0;
let answered = false;

function startQuiz() {
  document.getElementById('start-card').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = QUESTIONS[currentQ];
  const letters = ['A', 'B', 'C', 'D'];

  document.getElementById('q-counter').textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
  document.getElementById('score-badge').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / QUESTIONS.length) * 100}%`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next';
  btn.textContent = currentQ === QUESTIONS.length - 1 ? 'See Results →' : 'Next question →';

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    optList.appendChild(btn);
  });

  // Re-animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentQ];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.disabled = true);

  const fb = document.getElementById('feedback');

  if (idx === q.answer) {
    score++;
    btn.classList.add('correct');
    options[q.answer].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = `✓ Correct! ${q.explain}`;
  } else {
    wrong++;
    btn.classList.add('wrong');
    options[q.answer].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = `✗ Not quite. ${q.explain}`;
  }

  document.getElementById('score-badge').textContent = `Score: ${score}`;
  document.getElementById('btn-next').className = 'btn-next show';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('results-card').style.display = 'block';

  const pct = Math.round((score / QUESTIONS.length) * 100);

  let emoji, label, sub;
  if (pct === 100) {
    emoji = '🏆'; label = 'Perfect score!';
    sub = 'Flawless. You clearly know your IT fundamentals inside out.';
  } else if (pct >= 80) {
    emoji = '🎉'; label = 'Great work!';
    sub = 'Strong result. You\'ve got a solid grasp of IT concepts.';
  } else if (pct >= 60) {
    emoji = '👍'; label = 'Not bad!';
    sub = 'Good foundation. A bit more study and you\'ll ace it next time.';
  } else if (pct >= 40) {
    emoji = '📚'; label = 'Keep learning!';
    sub = 'There\'s room to grow. Review the areas you missed and try again.';
  } else {
    emoji = '💪'; label = 'Keep at it!';
    sub = 'IT is a journey. Every attempt builds your knowledge — try again!';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').innerHTML = `${score}<span>/${QUESTIONS.length}</span>`;
  document.getElementById('result-label').textContent = label;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-pct').textContent = pct + '%';
}

function restartQuiz() {
  currentQ = 0; score = 0; wrong = 0; answered = false;
  document.getElementById('results-card').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  showQuestion();
}
</script>
</body>
</html>
