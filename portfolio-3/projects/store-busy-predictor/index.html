<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Busy Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f5f7;--white:#fff;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--accent:#0071e3;--accent-light:#e8f0fe;--border:rgba(0,0,0,0.08);--radius:18px;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:700px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#1a7f37;background:#dafbe1;padding:3px 10px;border-radius:20px;margin-bottom:14px;}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.sub{font-size:14px;color:var(--text2);margin-bottom:22px;}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 0 rgba(0,0,0,.03),0 12px 36px rgba(0,0,0,.07);overflow:hidden;margin-bottom:16px;}
.card-head{padding:18px 22px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:22px;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
label{display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:500;}
select,input[type=range]{font-family:inherit;font-size:13px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);outline:none;width:100%;}
select:focus,input[type=range]:focus{border-color:var(--accent);}
input[type=range]{padding:4px 0;border:none;background:transparent;cursor:pointer;accent-color:var(--accent);}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-val{font-size:13px;font-weight:600;color:var(--accent);min-width:28px;}
.predict-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;margin-bottom:18px;}
.predict-btn:hover{background:#0077ed;transform:translateY(-1px);}
.result-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px;}
.result-box{background:var(--bg);border-radius:12px;padding:16px;text-align:center;}
.result-box .n{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--accent);}
.result-box .d{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.busy-meter{margin-bottom:18px;}
.meter-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;}
.meter-track{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;}
.meter-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.16,1,.3,1),background .4s;}
.busy-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;margin-top:10px;}
canvas#chart{width:100%;height:180px;}
.tip{font-size:12px;color:var(--text2);background:var(--accent-light);padding:10px 14px;border-radius:10px;margin-top:12px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">📈 ML Predictor · Live</div>
  <h1>Store Busy Predictor</h1>
  <p class="sub">Predict customer traffic using historical patterns to optimise staffing.</p>

  <div class="card">
    <div class="card-head">Input Parameters</div>
    <div class="card-body">
      <div class="controls">
        <label>Day of Week
          <select id="day">
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4" selected>Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
          </select>
        </label>
        <label>Time of Day
          <select id="hour">
            <option value="8">8:00 AM</option>
            <option value="9">9:00 AM</option>
            <option value="10">10:00 AM</option>
            <option value="11">11:00 AM</option>
            <option value="12">12:00 PM (Noon)</option>
            <option value="13" selected>1:00 PM</option>
            <option value="14">2:00 PM</option>
            <option value="15">3:00 PM</option>
            <option value="16">4:00 PM</option>
            <option value="17">5:00 PM</option>
            <option value="18">6:00 PM</option>
            <option value="19">7:00 PM</option>
          </select>
        </label>
        <label>Weather
          <select id="weather">
            <option value="1">☀️ Sunny</option>
            <option value="0.8">⛅ Cloudy</option>
            <option value="0.5">🌧️ Rainy</option>
            <option value="0.3">⛈️ Storm</option>
          </select>
        </label>
        <label>Season
          <select id="season">
            <option value="0.9">🌸 Spring</option>
            <option value="1.0" selected>☀️ Summer</option>
            <option value="0.85">🍂 Autumn</option>
            <option value="0.7">❄️ Winter</option>
          </select>
        </label>
      </div>
      <label style="margin-bottom:14px;">Promotions Running
        <div class="slider-row">
          <input type="range" id="promo" min="0" max="5" value="1" oninput="document.getElementById('promo-val').textContent=this.value">
          <span class="slider-val" id="promo-val">1</span>
        </div>
      </label>
      <button class="predict-btn" onclick="runPredict()">Predict Traffic →</button>

      <div class="result-row">
        <div class="result-box"><div class="n" id="r-customers">—</div><div class="d">Customers</div></div>
        <div class="result-box"><div class="n" id="r-staff">—</div><div class="d">Staff Needed</div></div>
        <div class="result-box"><div class="n" id="r-revenue">—</div><div class="d">Est. Revenue</div></div>
      </div>
      <div class="busy-meter">
        <div class="meter-label"><span>Busyness Level</span><span id="meter-pct">—</span></div>
        <div class="meter-track"><div class="meter-fill" id="meter-fill" style="width:0%"></div></div>
        <div id="busy-tag"></div>
      </div>
      <div class="card-head" style="padding:0;border:none;margin-bottom:10px;font-size:13px;font-weight:600;">24-Hour Traffic Forecast</div>
      <canvas id="chart"></canvas>
      <div class="tip" id="tip">Select your parameters and click Predict to see results.</div>
    </div>
  </div>
</div>

<script>
// Historical base traffic by hour
const baseHourly = [5,3,2,2,2,4,10,25,60,80,75,85,95,90,80,75,70,80,90,85,70,50,30,15];
// Day multipliers
const dayMult = [0.75,0.72,0.78,0.82,0.95,1.0,0.88];
// Tips
const tips = [
  ["Very Quiet","background:#f5f5f7;color:#6e6e73","Consider skeleton staffing. Great time for restocking and cleaning."],
  ["Moderate","background:#fff3cd;color:#856404","Standard staffing. Monitor closely — can ramp up if needed."],
  ["Busy","background:#e8f0fe;color:#0071e3","Full team recommended. Ensure checkout queues are managed."],
  ["Very Busy","background:#dafbe1;color:#1a7f37","Peak period — all hands on deck. Open all registers."],
  ["Extremely Busy","background:#fce8e6;color:#d93025","Maximum staffing needed. Consider queue management system."]
];

function runPredict() {
  const day = parseInt(document.getElementById('day').value);
  const hour = parseInt(document.getElementById('hour').value);
  const weather = parseFloat(document.getElementById('weather').value);
  const season = parseFloat(document.getElementById('season').value);
  const promo = parseInt(document.getElementById('promo').value);

  const base = baseHourly[hour] || 50;
  const dMult = dayMult[day];
  const promoBoost = 1 + promo * 0.12;
  const noise = 0.9 + Math.random() * 0.2;
  const customers = Math.round(base * dMult * weather * season * promoBoost * noise);
  const staff = Math.max(2, Math.ceil(customers / 15));
  const revenue = customers * (28 + Math.random() * 10);
  const pct = Math.min(100, Math.round(customers / 95 * 100));

  document.getElementById('r-customers').textContent = customers;
  document.getElementById('r-staff').textContent = staff;
  document.getElementById('r-revenue').textContent = '$' + Math.round(revenue).toLocaleString();
  document.getElementById('meter-pct').textContent = pct + '%';

  const fill = document.getElementById('meter-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct < 30 ? '#aeaeb2' : pct < 55 ? '#ff9f0a' : pct < 75 ? '#0071e3' : pct < 90 ? '#1a7f37' : '#d93025';

  let ti = pct < 20 ? 0 : pct < 45 ? 1 : pct < 65 ? 2 : pct < 85 ? 3 : 4;
  const t = tips[ti];
  document.getElementById('busy-tag').innerHTML = `<span class="busy-tag" style="${t[0]}">${['😴 Very Quiet','😐 Moderate','🙂 Busy','😤 Very Busy','🔥 Extremely Busy'][ti]}</span>`;
  document.getElementById('tip').textContent = `💡 ${t[2]}`;

  drawChart(day, weather, season, promo, hour);
}

function drawChart(day, weather, season, promo, activeHour) {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 180 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 180;
  const pad = {t:10,b:24,l:28,r:10};
  const dMult = dayMult[day];
  const promoBoost = 1 + parseInt(document.getElementById('promo').value) * 0.12;

  const values = baseHourly.slice(8,20).map((v,i) => {
    return Math.round(v * dMult * weather * season * promoBoost * (0.9 + Math.random()*0.2));
  });
  const hours = Array.from({length:12},(_,i)=>i+8);
  const maxV = Math.max(...values, 10);
  const barW = (W - pad.l - pad.r) / values.length;

  ctx.clearRect(0, 0, W, H);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25,0.5,0.75,1].forEach(f => {
    const y = pad.t + (H-pad.t-pad.b)*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#aeaeb2'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*f), pad.l-3, y+3);
  });

  values.forEach((v, i) => {
    const x = pad.l + i * barW + barW * 0.15;
    const bw = barW * 0.7;
    const bh = (v/maxV) * (H - pad.t - pad.b);
    const y = H - pad.b - bh;
    const isActive = (hours[i] === activeHour);
    ctx.fillStyle = isActive ? '#0071e3' : '#aeaeb2';
    ctx.beginPath();
    ctx.roundRect(x, y, bw, bh, [4,4,0,0]);
    ctx.fill();
    // Hour label
    ctx.fillStyle = isActive ? '#0071e3' : '#aeaeb2';
    ctx.font = `${isActive?'600':'400'} 9px Inter,sans-serif`;
    ctx.textAlign = 'center';
    const label = hours[i] > 12 ? `${hours[i]-12}pm` : hours[i] === 12 ? '12pm' : `${hours[i]}am`;
    ctx.fillText(label, x + bw/2, H - 6);
  });
}

// Run on load
runPredict();
window.addEventListener('resize', () => {
  const day = parseInt(document.getElementById('day').value);
  const weather = parseFloat(document.getElementById('weather').value);
  const season = parseFloat(document.getElementById('season').value);
  const promo = parseInt(document.getElementById('promo').value);
  const hour = parseInt(document.getElementById('hour').value);
  drawChart(day, weather, season, promo, hour);
});
</script>
</body>
</html>
