<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f5f7;--white:#fff;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--accent:#0071e3;--accent-light:#e8f0fe;--border:rgba(0,0,0,0.08);--radius:18px;--red:#d93025;--green:#1a7f37;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding:20px;}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
/* Top stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:18px;box-shadow:0 2px 0 rgba(0,0,0,.03);}
.stat .label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat .amount{font-size:26px;font-weight:700;letter-spacing:-1px;}
.stat.income .amount{color:var(--green);}
.stat.expense .amount{color:var(--red);}
.stat.balance .amount{color:var(--accent);}
/* Add transaction */
.add-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 0 rgba(0,0,0,.03),0 12px 36px rgba(0,0,0,.06);padding:20px;margin-bottom:20px;}
.add-card h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
input,select{font-family:inherit;font-size:13px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);outline:none;width:100%;}
input:focus,select:focus{border-color:var(--accent);}
.add-btn{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;height:40px;transition:all .2s;}
.add-btn:hover{background:#0077ed;}
/* Layout */
.layout{display:grid;grid-template-columns:1fr 280px;gap:16px;}
/* Transactions */
.tx-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 0 rgba(0,0,0,.03),0 12px 36px rgba(0,0,0,.06);overflow:hidden;}
.tx-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;justify-content:space-between;}
.tx-list{max-height:300px;overflow-y:auto;}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-info{flex:1;}
.tx-name{font-size:13px;font-weight:500;}
.tx-cat{font-size:11px;color:var(--text3);margin-top:1px;}
.tx-amt{font-size:14px;font-weight:700;}
.tx-amt.pos{color:var(--green);}
.tx-amt.neg{color:var(--red);}
.tx-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:all .15s;}
.tx-del:hover{background:var(--bg);color:var(--red);}
/* Chart side */
.chart-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 0 rgba(0,0,0,.03),0 12px 36px rgba(0,0,0,.06);padding:18px;}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:14px;}
canvas{width:100%;display:block;}
.cat-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:center;gap:8px;}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:12px;flex:1;color:var(--text2);}
.cat-amt{font-size:12px;font-weight:600;}
@media(max-width:640px){.layout{grid-template-columns:1fr;}.row{grid-template-columns:1fr 1fr;}.add-btn{grid-column:span 2;}}
</style>
</head>
<body>
<h1>💰 Budget Tracker</h1>
<p class="sub">Track spending, visualise patterns, and stay on budget.</p>

<div class="stats">
  <div class="stat income"><div class="label">Income</div><div class="amount" id="s-income">$0</div></div>
  <div class="stat expense"><div class="label">Expenses</div><div class="amount" id="s-expense">$0</div></div>
  <div class="stat balance"><div class="label">Balance</div><div class="amount" id="s-balance">$0</div></div>
</div>

<div class="add-card">
  <h3>Add Transaction</h3>
  <div class="row">
    <div class="field">
      <label>Description</label>
      <input type="text" id="desc" placeholder="e.g. Groceries">
    </div>
    <div class="field">
      <label>Amount ($)</label>
      <input type="number" id="amt" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="cat">
        <option value="💰 Income">💰 Income</option>
        <option value="🛒 Food">🛒 Food</option>
        <option value="🚗 Transport">🚗 Transport</option>
        <option value="🎮 Entertainment">🎮 Entertainment</option>
        <option value="💊 Health">💊 Health</option>
        <option value="📚 Education">📚 Education</option>
        <option value="🏠 Housing">🏠 Housing</option>
        <option value="👕 Shopping">👕 Shopping</option>
        <option value="⚡ Bills">⚡ Bills</option>
      </select>
    </div>
    <button class="add-btn" onclick="addTx()">+ Add</button>
  </div>
</div>

<div class="layout">
  <div class="tx-card">
    <div class="tx-head"><span>Transactions</span><span id="tx-count" style="color:var(--text3);font-weight:400;font-size:12px;"></span></div>
    <div class="tx-list" id="tx-list"></div>
  </div>
  <div class="chart-card">
    <h3>Spending by Category</h3>
    <canvas id="pie-canvas" height="200"></canvas>
    <div class="cat-list" id="cat-list"></div>
  </div>
</div>

<script>
const COLORS=['#0071e3','#ff9f0a','#1a7f37','#d93025','#8e2de2','#00b4d8','#e91e63','#795548'];
let txs=[
  {id:1,desc:'Salary',cat:'💰 Income',amt:3500,date:'Mar 1'},
  {id:2,desc:'Groceries',cat:'🛒 Food',amt:-120,date:'Mar 1'},
  {id:3,desc:'Netflix',cat:'🎮 Entertainment',amt:-17,date:'Mar 1'},
  {id:4,desc:'Bus Pass',cat:'🚗 Transport',amt:-55,date:'Feb 28'},
  {id:5,desc:'Rent',cat:'🏠 Housing',amt:-1200,date:'Mar 1'},
  {id:6,desc:'Coffee',cat:'🛒 Food',amt:-28,date:'Feb 28'},
];
let nextId=7;

function addTx(){
  const desc=document.getElementById('desc').value.trim();
  const amt=parseFloat(document.getElementById('amt').value);
  const cat=document.getElementById('cat').value;
  if(!desc||!amt) return;
  const isIncome=cat==='💰 Income';
  txs.unshift({id:nextId++,desc,cat,amt:isIncome?amt:-amt,date:'Today'});
  document.getElementById('desc').value='';
  document.getElementById('amt').value='';
  render();
}

function deleteTx(id){txs=txs.filter(t=>t.id!==id);render();}

function render(){
  // Stats
  const income=txs.filter(t=>t.amt>0).reduce((a,t)=>a+t.amt,0);
  const expense=Math.abs(txs.filter(t=>t.amt<0).reduce((a,t)=>a+t.amt,0));
  const bal=income-expense;
  document.getElementById('s-income').textContent='$'+income.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});
  document.getElementById('s-expense').textContent='$'+expense.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});
  document.getElementById('s-balance').textContent=(bal>=0?'$':'-$')+Math.abs(bal).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});

  // List
  const list=document.getElementById('tx-list');
  document.getElementById('tx-count').textContent=txs.length+' items';
  if(!txs.length){list.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px;">No transactions yet</div>';return;}
  list.innerHTML=txs.map(t=>`
    <div class="tx-item">
      <div class="tx-icon" style="background:${t.amt>0?'#dafbe1':'#fce8e6'}">${t.cat.split(' ')[0]}</div>
      <div class="tx-info"><div class="tx-name">${t.desc}</div><div class="tx-cat">${t.cat.split(' ').slice(1).join(' ')} · ${t.date}</div></div>
      <div class="tx-amt ${t.amt>0?'pos':'neg'}">${t.amt>0?'+':''}\$${Math.abs(t.amt).toFixed(2)}</div>
      <button class="tx-del" onclick="deleteTx(${t.id})">×</button>
    </div>`).join('');

  // Chart
  const expTxs=txs.filter(t=>t.amt<0);
  const bycat={};
  expTxs.forEach(t=>{bycat[t.cat]=(bycat[t.cat]||0)+Math.abs(t.amt);});
  const cats=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const total=cats.reduce((a,[,v])=>a+v,0)||1;
  drawPie(cats,total);
}

function drawPie(cats,total){
  const canvas=document.getElementById('pie-canvas');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=200*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=canvas.offsetWidth,H=200,cx=W/2,cy=H/2,r=80;
  ctx.clearRect(0,0,W,H);
  if(!cats.length){ctx.fillStyle='#e5e5ea';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();return;}
  let start=0;
  cats.forEach(([,v],i)=>{
    const slice=(v/total)*Math.PI*2;
    ctx.fillStyle=COLORS[i%COLORS.length];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);ctx.closePath();ctx.fill();
    start+=slice;
  });
  // Donut hole
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);ctx.fill();
  // Center text
  ctx.fillStyle='var(--text)';ctx.font=`700 ${14*dpr}px Inter,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  // Legend
  const cl=document.getElementById('cat-list');
  cl.innerHTML=cats.slice(0,5).map(([name,v],i)=>`
    <div class="cat-row">
      <div class="cat-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="cat-name">${name.split(' ').slice(1).join(' ')||name}</div>
      <div class="cat-amt">$${v.toFixed(0)}</div>
    </div>`).join('');
}

render();
window.addEventListener('resize',render);
</script>
</body>
</html>
