<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f5f7;--white:#fff;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--accent:#0071e3;--accent-light:#e8f0fe;--border:rgba(0,0,0,0.08);--radius:18px;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:520px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#1a7f37;background:#dafbe1;padding:3px 10px;border-radius:20px;margin-bottom:14px;}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.sub{font-size:14px;color:var(--text2);margin-bottom:22px;}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 0 rgba(0,0,0,.03),0 12px 36px rgba(0,0,0,.07);padding:28px;}
.pw-box{background:#1d1d1f;border-radius:14px;padding:18px 20px;margin-bottom:16px;position:relative;}
.pw-out{font-family:'SF Mono',Consolas,monospace;font-size:18px;color:#fff;word-break:break-all;line-height:1.5;min-height:26px;letter-spacing:.5px;}
.copy-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.copy-btn:hover{background:rgba(255,255,255,.22);}
.copy-btn.copied{background:#1a7f37;}

/* Strength */
.strength-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.strength-bars{display:flex;gap:4px;flex:1;}
.sbar{flex:1;height:5px;border-radius:3px;background:var(--bg);transition:background .3s;}
.strength-label{font-size:12px;font-weight:600;min-width:80px;text-align:right;}

/* Length */
.setting{margin-bottom:18px;}
.setting-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.setting-label{font-size:13px;font-weight:500;}
.setting-val{font-size:13px;font-weight:700;color:var(--accent);}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}

/* Toggles */
.toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:12px;cursor:pointer;}
.toggle-label{font-size:13px;font-weight:500;}
.switch{width:36px;height:20px;background:#ccc;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;}
.switch::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input[type=checkbox]{display:none;}
input[type=checkbox]:checked+.switch{background:var(--accent);}
input[type=checkbox]:checked+.switch::after{transform:translateX(16px);}
.toggle input{display:none;}

.gen-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;}
.gen-btn:hover{background:#0077ed;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,113,227,.3);}

.entropy{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">🔐 Web Crypto API · Secure</div>
  <h1>Password Generator</h1>
  <p class="sub">Cryptographically secure passwords generated in your browser. Nothing is sent anywhere.</p>

  <div class="card">
    <div class="pw-box">
      <div class="pw-out" id="pw-out">Click Generate →</div>
      <button class="copy-btn" id="copy-btn" onclick="copyPw()">Copy</button>
    </div>
    <div class="strength-row">
      <div class="strength-bars" id="sbars">
        <div class="sbar"></div><div class="sbar"></div><div class="sbar"></div><div class="sbar"></div>
      </div>
      <div class="strength-label" id="slabel" style="color:var(--text3)">—</div>
    </div>

    <div class="setting">
      <div class="setting-head">
        <span class="setting-label">Length</span>
        <span class="setting-val" id="len-val">16</span>
      </div>
      <input type="range" id="length" min="8" max="64" value="16" oninput="lenChange()">
    </div>

    <div class="toggles">
      <label class="toggle">
        <span class="toggle-label">Uppercase</span>
        <input type="checkbox" id="upper" checked><div class="switch"></div>
      </label>
      <label class="toggle">
        <span class="toggle-label">Lowercase</span>
        <input type="checkbox" id="lower" checked><div class="switch"></div>
      </label>
      <label class="toggle">
        <span class="toggle-label">Numbers</span>
        <input type="checkbox" id="nums" checked><div class="switch"></div>
      </label>
      <label class="toggle">
        <span class="toggle-label">Symbols</span>
        <input type="checkbox" id="syms" checked><div class="switch"></div>
      </label>
    </div>

    <button class="gen-btn" onclick="generate()">⟳ Generate Password</button>
    <div class="entropy" id="entropy"></div>
  </div>
</div>

<script>
let lastPw = '';

function lenChange() {
  document.getElementById('len-val').textContent = document.getElementById('length').value;
}

function generate() {
  const len = parseInt(document.getElementById('length').value);
  const useUpper = document.getElementById('upper').checked;
  const useLower = document.getElementById('lower').checked;
  const useNums = document.getElementById('nums').checked;
  const useSyms = document.getElementById('syms').checked;

  let chars = '';
  if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (useNums) chars += '0123456789';
  if (useSyms) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) { document.getElementById('pw-out').textContent = 'Select at least one option.'; return; }

  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  const pw = Array.from(arr).map(v => chars[v % chars.length]).join('');
  lastPw = pw;
  document.getElementById('pw-out').textContent = pw;

  // Strength
  const entropy = Math.log2(Math.pow(chars.length, len));
  document.getElementById('entropy').textContent = `Entropy: ${Math.round(entropy)} bits · ${chars.length} character pool`;

  const bars = document.querySelectorAll('.sbar');
  const sl = document.getElementById('slabel');
  let level, color, label;
  if (entropy < 40) { level=1; color='#d93025'; label='Weak'; }
  else if (entropy < 60) { level=2; color='#ff9f0a'; label='Fair'; }
  else if (entropy < 80) { level=3; color='#0071e3'; label='Strong'; }
  else { level=4; color='#1a7f37'; label='Very Strong'; }

  bars.forEach((b,i) => { b.style.background = i < level ? color : 'var(--bg)'; });
  sl.textContent = label; sl.style.color = color;

  // Reset copy btn
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copy'; btn.className = 'copy-btn';
}

function copyPw() {
  if (!lastPw) return;
  navigator.clipboard.writeText(lastPw).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!'; btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 2000);
  });
}

generate();
</script>
</body>
</html>
